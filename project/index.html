<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Earth's Echoes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          serif: ['"Instrument Serif"', 'serif'],
          sans: ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
          mono: ['"IBM Plex Mono"', 'monospace'],
        },
      },
    },
  };
</script>

<style>
  html, body, #root { height: 100%; margin: 0; background: #060608; color: #f5f5f4; font-family: "IBM Plex Sans", system-ui, sans-serif; overflow: hidden; }
  .serif { font-family: "Instrument Serif", serif; font-weight: 400; }
  .mono { font-family: "IBM Plex Mono", monospace; }
  .glass {
    background: rgba(10, 10, 14, 0.55);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 30px 60px rgba(0,0,0,0.45);
  }
  .glass-solid {
    background: rgba(8, 8, 12, 0.85);
    backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .hairline { border-color: rgba(255,255,255,0.08); }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* Starfield */
  .starfield {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.7), transparent 50%),
      radial-gradient(1px 1px at 70% 10%, rgba(255,255,255,0.55), transparent 50%),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.6), transparent 50%),
      radial-gradient(1px 1px at 35% 75%, rgba(255,255,255,0.5), transparent 50%),
      radial-gradient(1px 1px at 55% 40%, rgba(255,255,255,0.4), transparent 50%),
      radial-gradient(1.5px 1.5px at 15% 60%, rgba(255,255,255,0.65), transparent 50%),
      radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,0.55), transparent 50%),
      radial-gradient(0.5px 0.5px at 40% 20%, rgba(255,255,255,0.7), transparent 50%),
      radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.45), transparent 50%),
      radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.55), transparent 50%);
    background-size: 800px 800px;
    background-repeat: repeat;
    opacity: 0.8;
  }

  /* Animal pin */
  .pin {
    width: 44px; height: 44px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    position: relative; cursor: pointer;
    transition: transform 0.25s cubic-bezier(.2,.7,.2,1), box-shadow 0.25s;
    border: 2px solid var(--pin-color, #34d399);
    background: rgba(10,10,14,0.6);
    backdrop-filter: blur(6px);
  }
  .pin::before {
    content: ""; position: absolute; inset: -6px;
    border-radius: 999px;
    border: 1px solid var(--pin-color, #34d399);
    opacity: 0.35;
    animation: pulse 2.6s ease-out infinite;
  }
  .pin:hover { transform: scale(1.25); box-shadow: 0 0 30px var(--pin-color, #34d399); z-index: 10; }
  .pin img { width: 100%; height: 100%; border-radius: 999px; object-fit: cover; }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 999px;
    background: var(--pin-color); border: 2px solid rgba(255,255,255,0.9);
    box-shadow: 0 0 16px var(--pin-color);
    cursor: pointer;
    transition: transform 0.2s;
  }
  .pin-dot:hover { transform: scale(1.6); }
  .pin-card {
    display: flex; align-items: center; gap: 10px;
    background: rgba(8,8,12,0.85); backdrop-filter: blur(10px);
    border: 1px solid var(--pin-color);
    border-radius: 999px; padding: 4px 14px 4px 4px;
    cursor: pointer; transition: transform 0.2s;
  }
  .pin-card:hover { transform: scale(1.06); box-shadow: 0 0 24px var(--pin-color); }
  .pin-card img { width: 36px; height: 36px; border-radius: 999px; object-fit: cover; }
  .pin-card .lbl { font-size: 12px; font-weight: 500; color: #fff; white-space: nowrap; }

  .tooltip {
    position: absolute; bottom: 58px; left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(8,8,12,0.92);
    border: 1px solid var(--pin-color);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; letter-spacing: 0.04em;
    color: #f5f5f4;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }
  .pin:hover .tooltip, .pin-dot:hover + .tooltip, .pin-card:hover + .tooltip { opacity: 1; }

  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.5; }
    70% { transform: scale(1.6); opacity: 0; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* Range slider styling */
  input[type="range"].ee-range {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 2px; background: rgba(255,255,255,0.12);
    border-radius: 999px; outline: none;
  }
  input[type="range"].ee-range::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 999px;
    background: var(--accent, #34d399);
    border: 2px solid #0a0a0f;
    box-shadow: 0 0 18px var(--accent, #34d399);
    cursor: grab;
  }
  input[type="range"].ee-range::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 999px;
    background: var(--accent, #34d399); border: 2px solid #0a0a0f;
    box-shadow: 0 0 18px var(--accent, #34d399); cursor: grab;
  }

  /* Full-screen takeover scrollable column */
  .takeover-img-mask {
    mask-image: linear-gradient(to right, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
    -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
  }

  /* Caption entry animation */
  @keyframes captionIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .caption-enter { animation: captionIn 0.6s cubic-bezier(.2,.7,.2,1) both; }

  /* Waveform canvas */
  .wave-bars { display: flex; align-items: end; gap: 2px; height: 14px; }
  .wave-bars span {
    width: 2px; background: var(--accent, #34d399);
    transition: height 0.12s ease-out;
    border-radius: 1px;
  }

  /* Hairline divider used throughout */
  .hr-line { height: 1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent); }

  /* Film grain */
  .grain {
    position: fixed; inset: -50%; z-index: 200; pointer-events: none;
    opacity: 0.055; mix-blend-mode: overlay;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter><rect width="280" height="280" filter="url(%23n)"/></svg>');
    animation: grainShift 0.9s steps(4) infinite;
  }
  @keyframes grainShift {
    0% { transform: translate(0, 0); }
    25% { transform: translate(-2%, 1%); }
    50% { transform: translate(1%, -2%); }
    75% { transform: translate(-1%, 2%); }
    100% { transform: translate(2%, -1%); }
  }

  /* Editorial rise-in reveal */
  @keyframes riseIn { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: none; } }
  .rise { animation: riseIn 0.9s cubic-bezier(.16,1,.3,1) both; }

  /* Intro title sequence */
  .intro-mask { display: inline-block; overflow: hidden; vertical-align: bottom; }
  .intro-up { display: inline-block; transform: translateY(115%); animation: introUp 1.1s cubic-bezier(.16,1,.3,1) 0.2s forwards; }
  @keyframes introUp { to { transform: translateY(0); } }
  .intro-fade { opacity: 0; animation: introFade 1.2s ease-out forwards; }
  @keyframes introFade { to { opacity: 1; } }
  .intro-line { animation: introLine 1.4s cubic-bezier(.16,1,.3,1) 0.2s forwards; }
  @keyframes introLine { to { width: min(560px, 60vw); } }

  /* Subtle vignette */
  .vignette::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
  }

  /* Custom scrollbar for takeover */
  .ee-scroll::-webkit-scrollbar { width: 4px; }
  .ee-scroll::-webkit-scrollbar-track { background: transparent; }
  .ee-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  /* Editorial theme overrides */
  body.theme-editorial { background: #1a1512; color: #f5efe6; }
  body.theme-editorial .glass { background: rgba(26, 21, 18, 0.7); border-color: rgba(245, 239, 230, 0.1); }
  body.theme-editorial .glass-solid { background: rgba(20, 17, 14, 0.9); border-color: rgba(245, 239, 230, 0.1); }

  /* HUD theme overrides */
  body.theme-hud { background: #030509; }
  body.theme-hud .glass {
    background: rgba(3, 8, 14, 0.75);
    border: 1px solid rgba(var(--accent-rgb, 52 211 153), 0.25);
    box-shadow: 0 0 0 1px rgba(var(--accent-rgb, 52 211 153), 0.1) inset;
  }
  body.theme-hud .hr-line { background: linear-gradient(to right, transparent, rgba(var(--accent-rgb), 0.35), transparent); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
