# Builds the app and publishes it to GitHub Pages.
# Live URL: https://kalkiterminator.github.io/Earth_Echoes_v2/
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      # Temporary: deploy from the review branch so the site goes live before
      # the PR merges. Remove this line once the PR is merged.
      - claude/code-review-r0ozfm
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Mirror species images (best effort — app falls back to remote)
        run: node scripts/fetch-images.mjs || true

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /Earth_Echoes_v2/

      - name: SPA fallback for client-side routes
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
